<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Status do Personagem</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #242424;
            color: white;
            padding: 15px;
        }
        .status-box {
            background-color: #333;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
        input {
            width: 100%;
            padding: 5px;
            margin-top: 5px;
            box-sizing: border-box;
            background-color: #444;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }
        label { font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <h2>Ficha Rápida</h2>

    <div class="status-box">
        <label>Nome do Personagem</label>
        <input type="text" id="char-name" placeholder="Ex: Arthur">
    </div>

    <div class="status-box">
        <label>(PV)</label>
        <input type="text" id="char-hp" placeholder="Ex: 25/30">
    </div>

    <div class="status-box">
        <label>(SAN)</label>
        <input type="text" id="char-san" placeholder="Ex: 40/50">
    </div>

    <div class="status-box">
        <label>(PE)</label>
        <input type="text" id="char-pe" placeholder="Ex: 12/15">
    </div>

    <script type="module" src="./app.js"></script>

</body>
</html>
