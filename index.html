<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Status do Personagem</title>
    <style>
        /* Fundo geral escuro */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; 
            color: white;
            padding: 10px;
            margin: 0;
        }

        /* O "card" que segura as informações */
        .character-card {
            display: flex;
            justify-content: space-between; /* Joga o nome pra esquerda e a iniciativa pra direita */
            align-items: center;
            background-color: #111111; /* Fundo um pouco mais escuro pro personagem */
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        /* Seção da esquerda (Nome em cima, Status embaixo) */
        .info-section {
            display: flex;
            flex-direction: column;
            gap: 8px; 
        }

        /* Linha dos Status (PV, SAN, PE lado a lado) */
        .stats-row {
            display: flex;
            gap: 15px; 
        }

        /* Reset nas caixas de texto para não parecerem caixas (sem borda e sem fundo) */
        input {
            background: transparent;
            border: none;
            outline: none;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }

        /* Cores e Tamanhos Específicos */
        .char-name {
            color: white;
            font-size: 18px;
            width: 150px;
        }

        .stat-pv {
            color: #ff5555; /* Vermelho */
            font-size: 13px;
            width: 45px;
        }

        .stat-san {
            color: #aa55ff; /* Roxo */
            font-size: 13px;
            width: 45px;
        }

        .stat-pe {
            color: #ffff55; /* Amarelo */
            font-size: 13px;
            width: 45px;
        }

        /* Iniciativa à direita */
        .stat-ini {
            color: white;
            font-size: 26px;
            width: 40px;
            text-align: center;
            border-bottom: 2px solid white; /* Cria a linha embaixo do zero */
            padding-bottom: 2px;
        }
        
        /* Efeito ao passar o mouse por cima das caixas de texto para saber que dá pra editar */
        input:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="character-card">
        
        <div class="info-section">
            <input type="text" class="char-name" id="nome" value="Yuki" placeholder="Nome">
            
            <div class="stats-row">
                <input type="text" class="stat-pv" id="pv" value="31 / 31" title="Vida (PV)">
                <input type="text" class="stat-san" id="san" value="47 / 47" title="Sanidade (SAN)">
                <input type="text" class="stat-pe" id="pe" value="41 / 49" title="Pontos de Esforço (PE)">
            </div>
        </div>

        <div>
            <input type="text" class="stat-ini" id="ini" value="0" title="Iniciativa">
        </div>

    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
