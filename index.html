<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tracker Ordem Paranormal</title>
    <style>
        /* Estilos Base */
        body {
            font-family: Arial, sans-serif;
            background-color: #0c0c0c; 
            color: white;
            padding: 10px;
            margin: 0;
        }

        .tela-oculta { display: none; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .menu-btn {
            background-color: #111;
            border: 1px solid #a855f7; 
            color: white;
            padding: 12px 5px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
        }

        .btn-voltar {
            background-color: #1a1a1a;
            border: 1px solid #444;
            color: #aaa;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-bottom: 10px;
        }

        /* --- Estilos de Atributos --- */
        .atributos-wrapper {
            position: relative;
            width: 240px; 
            height: 240px;
            margin: 0 auto;
            background-image: url('atributos.png'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .input-atrib {
            position: absolute;
            width: 45px; 
            height: 45px;
            background: transparent;
            border: none;
            color: white; 
            font-size: 24px; 
            font-weight: bold;
            text-align: center;
            outline: none;
            transform: translate(-50%, -50%); 
        }

        /* Coordenadas */
        .pos-agi { top: 17%; left: 50%; }
        .pos-int { top: 38%; left: 81%; }
        .pos-vig { top: 75%; left: 72%; }
        .pos-pre { top: 75%; left: 28%; }
        .pos-for { top: 38%; left: 19%; }

        /* --- CAMPOS EXTRA DE STATUS --- */
        .stats-extras-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 240px;
            margin-left: auto;
            margin-right: auto;
        }

        .row-top-stats {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 5px;
        }

        .stat-box-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .label-stack {
            font-size: 9px;
            color: #888;
            font-weight: bold;
            text-align: center;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .input-box-style {
            background: #0a0a0a;
            border: 1px solid #ffffff;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            padding: 5px;
            border-radius: 2px;
            outline: none;
            box-sizing: border-box;
        }

        .nex-container {
            display: inline-flex;
            align-items: center;
            background: #0a0a0a;
            border: 1px solid #ffffff;
            border-radius: 2px;
            padding: 5px;
            box-sizing: border-box;
            height: 27px;
        }

        #ext-nex {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            width: 24px;
            outline: none;
            padding: 0;
        }

        .nex-fixed-symbol {
            font-size: 13px;
            color: white;
            font-weight: bold;
            margin-left: 1px;
            user-select: none;
        }

        #ext-pe-turno { width: 35px; height: 27px; }
        #ext-deslocamento { width: 80px; height: 27px; }

        /* Barras de Recursos */
        .resource-bar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .resource-label {
            font-size: 11px;
            font-weight: bold;
            color: #aaa;
            letter-spacing: 1px;
        }

        .resource-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 32px;
            border: 1px solid #333;
            box-sizing: border-box;
            background-color: #0a0a0a;
        }

        .resource-bar button {
            background: transparent;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            padding: 0 10px;
            height: 100%;
            z-index: 2;
        }

        .resource-bar button:hover { background: rgba(255, 255, 255, 0.1); }
        .resource-bar input {
            background: transparent;
            border: none;
            color: white;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            width: 90px;
            outline: none;
            z-index: 2;
        }

        /* --- TELA DE PERÍCIAS ESTILO OFICIAL --- */
        .pericias-wrapper {
            max-height: 440px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .pericias-wrapper::-webkit-scrollbar { width: 4px; }
        .pericias-wrapper::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* Grid de Cabeçalho e Linhas */
        .pericia-header-row {
            display: grid;
            grid-template-columns: 18px 95px 55px 48px 40px 40px;
            gap: 2px;
            font-size: 9px;
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
            margin-bottom: 6px;
            text-align: center;
        }
        .pericia-header-row span:nth-child(2) { text-align: left; }

        .pericia-item-row {
            display: grid;
            grid-template-columns: 18px 95px 55px 48px 40px 40px;
            gap: 2px;
            align-items: center;
            padding: 5px 0;
            font-size: 12px;
            text-align: center;
        }
        .pericia-item-row .p-nome { text-align: left; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Redução e estilização da coluna de dados (atributos) */
        .pericia-item-row .p-attr { 
            font-size: 9px; 
            color: #888; 
            font-weight: normal;
        }

        .pericia-item-row svg { display: block; margin: 0 auto; color: #666; }

        /* Cores Dinâmicas pelo Grau de Treinamento */
        .p-treino-0 { color: #ffffff; }
        .p-treino-5 { color: #22c55e; }  /* Verde Treinado */
        .p-treino-10 { color: #3b82f6; } /* Azul Veterano */
        .p-treino-15 { color: #f97316; } /* Laranja Expert */

        /* Inputs em Formato de Linha de Ficha Clássica */
        .pericia-select-ficha {
            background: transparent;
            color: inherit;
            border: none;
            border-bottom: 1px solid currentColor;
            font-size: 11px;
            text-align: center;
            width: 35px;
            outline: none;
            cursor: pointer;
            font-weight: bold;
        }
        .pericia-select-ficha option { background: #111; color: white; }

        .pericia-input-ficha {
            background: transparent;
            color: inherit;
            border: none;
            border-bottom: 1px solid currentColor;
            font-size: 11px;
            text-align: center;
            width: 30px;
            outline: none;
            font-weight: bold;
        }

        .pericia-legenda {
            font-size: 10px;
            color: #666;
            text-align: center;
            margin-top: 15px;
            font-style: italic;
            line-height: 14px;
        }

        /* Outros Componentes Ficha */
        .form-container { display: flex; flex-direction: column; gap: 10px; background: #111; padding: 15px; border-radius: 8px; }
        .form-group { display: flex; align-items: center; border-bottom: 1px solid #fff; padding-bottom: 3px; }
        .form-group label { font-size: 10px; color: #888; width: 100px; }
        .form-group input { color: white; flex-grow: 1; border: none; background: transparent; outline: none; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        
        .character-card { display: flex; justify-content: space-between; align-items: center; background: #111; padding: 12px; border-radius: 8px; }
        .stats-row { display: flex; gap: 10px; }
        .stat-pv { color: #ff5555; width: 45px; font-weight: bold; background: transparent; border: none; }
        .stat-san { color: #aa55ff; width: 45px; font-weight: bold; background: transparent; border: none; }
        .stat-pe { color: #ffff55; width: 45px; font-weight: bold; background: transparent; border: none; }
        .stat-ini { color: white; font-size: 26px; width: 40px; text-align: center; border: none; border-bottom: 2px solid white; background: transparent; }

        /* --- Customização do Travamento de Inputs --- */
        .input-travado {
            pointer-events: none !important;
            user-select: none !important;
            outline: none !important;
        }

        .input-editavel:not(.input-travado) {
            background: rgba(168, 85, 247, 0.2) !important;
            border-radius: 4px !important;
            box-shadow: 0 0 5px #a855f7 !important;
        }

        /* Botão Vermelho de Excluir */
        .btn-excluir {
            margin-top: 15px;
            width: 100%;
            background-color: #991b1b;
            color: white;
            border: 1px solid #7f1d1d;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .btn-excluir:hover {
            background-color: #b91c1c;
        }
    </style>
</head>
<body>

    <div id="tela-raiz" class="menu-grid">
        <button class="menu-btn" onclick="abrirIniciativa('raiz')">Iniciativa</button>
        <button class="menu-btn" onclick="mostrarListaPersonagens()">Personagens</button>
    </div>

    <div id="tela-lista-personagens" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarParaRaiz()">⬅ Voltar</button>
        <div id="lista-botoes-personagens" class="menu-grid"></div>
    </div>

    <div id="menu-personagem" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarParaLista()">⬅ Voltar para Lista</button>
        <h3 id="nome-titulo-personagem" style="margin: 5px 0 12px 0; color: #a855f7; text-align:center;">Nome</h3>
        <div class="menu-grid">
            <button class="menu-btn" onclick="abrirAbaChar('aba-info')">Informações</button>
            <button class="menu-btn" onclick="abrirIniciativa('menu-char')">Iniciativa</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-atrib')">Atributos</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-pericias')">Perícias</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-combate')">Combate</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-inv')">Inventário</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-hab')">Habilidades</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-rituais')">Rituais</button>
        </div>
    </div>

    <div id="aba-atrib" class="tela-oculta">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 240px; margin: 0 auto 10px auto;">
            <button class="btn-voltar" onclick="voltarParaMenuChar()" style="margin-bottom: 0;">⬅ Voltar</button>
            <button id="btn-toggle-atrib" style="background: #111; border: 1px solid #444; color: #aaa; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 3px;" onclick="toggleModoEdicao()">✏️ Editar</button>
        </div>
        
        <div class="atributos-wrapper">
            <input type="text" id="at-agi" class="input-atrib pos-agi input-travado input-editavel" value="0" readonly oninput="salvarAtributos()">
            <input type="text" id="at-int" class="input-atrib pos-int input-travado input-editavel" value="0" readonly oninput="salvarAtributos()">
            <input type="text" id="at-vig" class="input-atrib pos-vig input-travado input-editavel" value="0" readonly oninput="salvarAtributos()">
            <input type="text" id="at-pre" class="input-atrib pos-pre input-travado input-editavel" value="0" readonly oninput="salvarAtributos()">
            <input type="text" id="at-for" class="input-atrib pos-for input-travado input-editavel" value="0" readonly oninput="salvarAtributos()">
        </div>

        <div class="stats-extras-container">
            <div class="row-top-stats">
                <div class="stat-box-stack">
                    <div class="nex-container">
                        <input type="text" id="ext-nex" class="input-travado input-editavel" value="0" readonly oninput="salvarExtras()">
                        <span class="nex-fixed-symbol">%</span>
                    </div>
                    <span class="label-stack">NEX</span>
                </div>
                
                <div class="stat-box-stack">
                    <input type="text" id="ext-pe-turno" class="input-box-style input-travado input-editavel" value="0" readonly oninput="salvarExtras()">
                    <span class="label-stack">PE / TURNO</span>
                </div>
                
                <div class="stat-box-stack">
                    <input type="text" id="ext-deslocamento" class="input-box-style input-travado input-editavel" value="0m" readonly oninput="salvarExtras()">
                    <span class="label-stack">DESLOCAMENTO</span>
                </div>
            </div>

            <div class="resource-bar-container">
                <span class="resource-label">VIDA</span>
                <div id="bar-vida" class="resource-bar">
                    <button onclick="ajustarStatus('pv', -5)">&lt;&lt;</button>
                    <button onclick="ajustarStatus('pv', -1)">&lt;</button>
                    <input type="text" id="bar-display-pv" value="0 / 0" oninput="salvarExtrasDireto('pv', this.value)">
                    <button onclick="ajustarStatus('pv', 1)">&gt;</button>
                    <button onclick="ajustarStatus('pv', 5)">&gt;&gt;</button>
                </div>
            </div>

            <div class="resource-bar-container">
                <span class="resource-label">SANIDADE</span>
                <div id="bar-sanidade" class="resource-bar">
                    <button onclick="ajustarStatus('san', -5)">&lt;&lt;</button>
                    <button onclick="ajustarStatus('san', -1)">&lt;</button>
                    <input type="text" id="bar-display-san" value="0 / 0" oninput="salvarExtrasDireto('san', this.value)">
                    <button onclick="ajustarStatus('san', 1)">&gt;</button>
                    <button onclick="ajustarStatus('san', 5)">&gt;&gt;</button>
                </div>
            </div>

            <div class="resource-bar-container">
                <span class="resource-label">ESFORÇO</span>
                <div id="bar-esforco" class="resource-bar">
                    <button onclick="ajustarStatus('pe', -5)">&lt;&lt;</button>
                    <button onclick="ajustarStatus('pe', -1)">&lt;</button>
                    <input type="text" id="bar-display-pe" value="0 / 0" oninput="salvarExtrasDireto('pe', this.value)">
                    <button onclick="ajustarStatus('pe', 1)">&gt;</button>
                    <button onclick="ajustarStatus('pe', 5)">&gt;&gt;</button>
                </div>
            </div>

            <div class="defesa-container" style="margin-top: 5px; border-top: 1px solid #333; padding-top: 12px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    
                    <div style="display: flex; align-items: center; gap: 6px;">
                        <div style="position: relative; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; background: url('data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23ffffff\' stroke-width=\'1.5\'><path d=\'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z\'/></svg>') no-repeat center; background-size: contain;">
                            <span id="defesa-total" style="font-size: 14px; font-weight: bold; margin-top: -2px;">10</span>
                        </div>
                        <div style="display: flex; flex-direction: column;">
                            <span style="font-size: 10px; font-weight: bold; color: #aaa; letter-spacing: 0.5px;">DEFESA</span>
                            <div style="font-size: 9px; color: #666; display: flex; align-items: center; gap: 1px; margin-top: 2px;">
                                =10+AGI+
                                <input id="def-equip" type="text" class="input-travado input-editavel" value="0" readonly oninput="salvarAtributos()" style="width: 14px; background: transparent; border: none; border-bottom: 1px solid #444; color: white; text-align: center; font-size: 9px; padding: 0; font-weight: bold; outline: none;">+
                                <input id="def-outros" type="text" class="input-travado input-editavel" value="0" readonly oninput="salvarAtributos()" style="width: 14px; background: transparent; border: none; border-bottom: 1px solid #444; color: white; text-align: center; font-size: 9px; padding: 0; font-weight: bold; outline: none;">
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 12px; text-align: center;">
                        <div>
                            <span style="font-size: 9px; font-weight: bold; color: #aaa; letter-spacing: 0.5px;">BLOQUEIO</span>
                            <div id="bloqueio-total" style="font-size: 14px; font-weight: bold; margin-top: 2px; border-bottom: 1px solid #444; width: 30px; margin-left: auto; margin-right: auto;">0</div>
                        </div>
                        <div>
                            <span style="font-size: 9px; font-weight: bold; color: #aaa; letter-spacing: 0.5px;">ESQUIVA</span>
                            <div id="esquiva-total" style="font-size: 14px; font-weight: bold; margin-top: 2px; border-bottom: 1px solid #444; width: 30px; margin-left: auto; margin-right: auto;">10</div>
                        </div>
                    </div>
                </div>

                <div style="display: flex; flex-direction: column; gap: 6px; font-size: 11px;">
                    <div style="display: flex; align-items: center; border-bottom: 1px solid #222; padding-bottom: 2px;">
                        <span style="color: #888; font-weight: bold; font-size: 9px; width: 80px; flex-shrink: 0; letter-spacing: 0.5px;">PROTEÇÃO</span>
                        <input id="def-protecao" type="text" class="input-travado input-editavel" readonly oninput="salvarAtributos()" style="width: 100%; background: transparent; border: none; color: white; font-size: 11px; padding: 0; outline: none;">
                    </div>
                    <div style="display: flex; align-items: center; border-bottom: 1px solid #222; padding-bottom: 2px;">
                        <span style="color: #888; font-weight: bold; font-size: 9px; width: 80px; flex-shrink: 0; letter-spacing: 0.5px;">RESISTÊNCIAS</span>
                        <input id="def-resistencias" type="text" class="input-travado input-editavel" readonly oninput="salvarAtributos()" style="width: 100%; background: transparent; border: none; color: white; font-size: 11px; padding: 0; outline: none;">
                    </div>
                    <div style="display: flex; align-items: center; border-bottom: 1px solid #222; padding-bottom: 2px;">
                        <span style="color: #888; font-weight: bold; font-size: 9px; width: 80px; flex-shrink: 0; letter-spacing: 0.5px;">PROFICIÊNCIAS</span>
                        <input id="def-proficiencias" type="text" class="input-travado input-editavel" readonly oninput="salvarAtributos()" style="width: 100%; background: transparent; border: none; color: white; font-size: 11px; padding: 0; outline: none;">
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="aba-pericias" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button>
        
        <div class="pericias-wrapper">
            <div class="pericia-header-row">
                <span></span>
                <span>Perícia</span>
                <span>Dados</span>
                <span>Bônus</span>
                <span>Treino</span>
                <span>Outros</span>
            </div>
            <div id="lista-pericias-container"></div>
            
            <div class="pericia-legenda">
                + Penalidade de carga. &nbsp;&nbsp; * Somente treinada.
            </div>
        </div>
    </div>

    <div id="aba-iniciativa" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarDeIniciativa()">⬅ Voltar</button>
        <div id="lista-iniciativa-cards" style="display: flex; flex-direction: column; gap: 10px;"></div>
    </div>

    <div id="aba-info" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button>
        <div class="form-container">
            <div class="form-group"><label>PERSONAGEM</label><input type="text" id="info-nome" oninput="salvarDadosForm()"></div>
            <div class="form-group"><label>JOGADOR</label><input type="text" id="info-jogador" oninput="salvarDadosForm()"></div>
            <div class="form-group"><label>ORIGEM</label><input type="text" id="info-origem" oninput="salvarDadosForm()"></div>
            <div class="form-group"><label>CLASSE</label><input type="text" id="info-classe" oninput="salvarDadosForm()"></div>
            <div class="checkbox-group">
                <input type="checkbox" id="info-em-iniciativa" onchange="alternarIniciativa(this.checked)">
                <label for="info-em-iniciativa">Adicionar à iniciativa</label>
            </div>
            
            <button class="btn-excluir" onclick="excluirPersonagemAtual()">
                Excluir Personagem
            </button>
        </div>
    </div>

    <div id="aba-combate" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button></div>
    <div id="aba-inv" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button></div>
    <div id="aba-hab" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button></div>
    <div id="aba-rituais" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button></div>

    <script>
        function toggleModoEdicao() {
            const btn = document.getElementById('btn-toggle-atrib');
            const inputs = document.querySelectorAll('.input-editavel');
            
            if (btn.innerHTML.includes('Editar')) {
                // ALTERNA PARA MODO: EDITANDO
                btn.innerHTML = 'Salvar';
                btn.style.borderColor = '#22c55e'; // Borda verde indicativa
                btn.style.color = '#22c55e';
                
                inputs.forEach(input => {
                    input.removeAttribute('readonly');
                    input.classList.remove('input-travado');
                });
            } else {
                // ALTERNA PARA MODO: SALVO / TRAVADO
                btn.innerHTML = 'Editar';
                btn.style.borderColor = '#444';
                btn.style.color = '#aaa';
                
                inputs.forEach(input => {
                    input.setAttribute('readonly', 'true');
                    input.classList.add('input-travado');
                });
                
                // Dispara o salvamento chamando as funções que já existem no seu app.js
                if (typeof salvarAtributos === 'function') {
                    salvarAtributos();
                }
                if (typeof salvarExtras === 'function') {
                    salvarExtras();
                }
            }
        }
    </script>

    <script type="module" src="./app.js"></script>
</body>
</html>
