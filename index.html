<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tracker Ordem Paranormal</title>
    <style>
        /* Estilo de fundo geral */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; 
            color: white;
            padding: 10px;
            margin: 0;
        }

        /* Utilitário para ocultar telas */
        .tela-oculta {
            display: none;
        }

        /* Grade do Menu (2 colunas) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        /* Botões Estilo Ordem Paranormal */
        .menu-btn {
            background-color: #111;
            border: 1px solid #a855f7; 
            color: white;
            padding: 12px 5px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background-color: #222;
            border-color: #c084fc;
        }

        /* Botão para retornar */
        .btn-voltar {
            background-color: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .btn-voltar:hover {
            background-color: #333;
            color: white;
        }

        /* --- Estilo: Ficha de Informações (Formulário) --- */
        .form-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            background-color: #111;
            padding: 15px;
            border-radius: 8px;
        }

        .form-group {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #fff;
            padding-bottom: 3px;
        }

        .form-group label {
            font-size: 11px;
            color: #888;
            font-weight: bold;
            width: 110px;
            letter-spacing: 0.5px;
        }

        .form-group input {
            color: white;
            font-size: 16px;
            flex-grow: 1;
            border: none;
            background: transparent;
            outline: none;
            font-family: Arial, sans-serif;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 5px;
            font-size: 13px;
            color: #ccc;
        }

        .checkbox-group input {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #a855f7;
        }

        /* --- O Visual Original do Card de Status (Mantido e Protegido) --- */
        .character-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #111111;
            padding: 12px 15px;
            border-radius: 8px;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 8px; 
        }

        .stats-row {
            display: flex;
            gap: 15px; 
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }

        .char-name { color: white; font-size: 18px; width: 150px; }
        .stat-pv { color: #ff5555; font-size: 13px; width: 45px; }
        .stat-san { color: #aa55ff; font-size: 13px; width: 45px; }
        .stat-pe { color: #ffff55; font-size: 13px; width: 45px; }

        .stat-ini {
            color: white;
            font-size: 26px;
            width: 40px;
            text-align: center;
            border-bottom: 2px solid white;
            padding-bottom: 2px;
        }
        
        input:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="tela-raiz" class="menu-grid">
        <button class="menu-btn" onclick="abrirIniciativa('raiz')">Iniciativa</button>
        <button class="menu-btn" onclick="mostrarListaPersonagens()">Personagens</button>
    </div>

    <div id="tela-lista-personagens" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarParaRaiz()">⬅ Voltar</button>
        <div id="lista-botoes-personagens" class="menu-grid">
            </div>
    </div>

    <div id="menu-personagem" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarParaLista()">⬅ Voltar para Lista</button>
        <h3 id="nome-titulo-personagem" style="margin: 5px 0 12px 0; color: #a855f7; text-align:center;">Nome</h3>
        <div class="menu-grid">
            <button class="menu-btn" onclick="abrirAbaChar('aba-info')">Informações</button>
            <button class="menu-btn" onclick="abrirIniciativa('menu-char')">Iniciativa</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-atrib')">Atributos</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-pericias')">Perícias</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-combate')">Combate</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-inv')">Inventário</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-hab')">Habilidades</button>
            <button class="menu-btn" onclick="abrirAbaChar('aba-rituais')">Rituais</button>
        </div>
    </div>

    <div id="aba-iniciativa" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarDeIniciativa()">⬅ Voltar</button>
        <div class="character-card">
            <div class="info-section">
                <input type="text" class="char-name" id="char-name-display" oninput="salvarDadosIniciativa()">
                <div class="stats-row">
                    <input type="text" class="stat-pv" id="char-pv" oninput="salvarDadosIniciativa()">
                    <input type="text" class="stat-san" id="char-san" oninput="salvarDadosIniciativa()">
                    <input type="text" class="stat-pe" id="char-pe" oninput="salvarDadosIniciativa()">
                </div>
            </div>
            <div>
                <input type="text" class="stat-ini" id="char-ini" oninput="salvarDadosIniciativa()">
            </div>
        </div>
    </div>

    <div id="aba-info" class="tela-oculta">
        <button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button>
        <div class="form-container">
            <div class="form-group">
                <label>PERSONAGEM</label>
                <input type="text" id="info-nome" oninput="salvarDadosForm()">
            </div>
            <div class="form-group">
                <label>JOGADOR</label>
                <input type="text" id="info-jogador" oninput="salvarDadosForm()">
            </div>
            <div class="form-group">
                <label>ORIGEM</label>
                <input type="text" id="info-origem" oninput="salvarDadosForm()">
            </div>
            <div class="form-group">
                <label>CLASSE</label>
                <input type="text" id="info-classe" oninput="salvarDadosForm()">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="info-em-iniciativa" onchange="alternarIniciativa(this.checked)">
                <label for="info-em-iniciativa">Adicionar à iniciativa</label>
            </div>
        </div>
    </div>

    <div id="aba-atrib" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button><p style="color:#aaa; font-size:13px;">AGI, FOR, INT...</p></div>
    <div id="aba-pericias" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button><p style="color:#aaa; font-size:13px;">Perícias...</p></div>
    <div id="aba-combate" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button><p style="color:#aaa; font-size:13px;">Ataques...</p></div>
    <div id="aba-inv" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button><p style="color:#aaa; font-size:13px;">Itens...</p></div>
    <div id="aba-hab" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button><p style="color:#aaa; font-size:13px;">Poderes...</p></div>
    <div id="aba-rituais" class="tela-oculta"><button class="btn-voltar" onclick="voltarParaMenuChar()">⬅ Voltar</button><p style="color:#aaa; font-size:13px;">Rituais...</p></div>

    <script type="module" src="./app.js"></script>
</body>
</html>
