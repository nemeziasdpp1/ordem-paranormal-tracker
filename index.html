<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Tracker Ordem Paranormal</title>
    <style>
        /* Estilo de fundo geral */
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a; 
            color: white;
            padding: 10px;
            margin: 0;
        }

        /* Grade do Menu Principal (2 colunas) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        /* Botões do Menu com o Roxo da Ordem */
        .menu-btn {
            background-color: #111;
            border: 1px solid #a855f7; 
            color: white;
            padding: 12px 5px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background-color: #222;
            border-color: #c084fc;
        }

        /* Esconde todas as abas de conteúdo por padrão */
        .aba-conteudo {
            display: none;
        }

        /* Botão para retornar ao menu principal */
        .btn-voltar {
            background-color: #222;
            border: 1px solid #444;
            color: #aaa;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .btn-voltar:hover {
            background-color: #333;
            color: white;
        }

        /* --- Estilos do Card de Status (Mantidos) --- */
        .character-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #111111;
            padding: 12px 15px;
            border-radius: 8px;
        }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 8px; 
        }

        .stats-row {
            display: flex;
            gap: 15px; 
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            font-weight: bold;
            font-family: Arial, sans-serif;
        }

        .char-name { color: white; font-size: 18px; width: 150px; }
        .stat-pv { color: #ff5555; font-size: 13px; width: 45px; }
        .stat-san { color: #aa55ff; font-size: 13px; width: 45px; }
        .stat-pe { color: #ffff55; font-size: 13px; width: 45px; }

        .stat-ini {
            color: white;
            font-size: 26px;
            width: 40px;
            text-align: center;
            border-bottom: 2px solid white;
            padding-bottom: 2px;
        }
        
        input:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="menu-principal" class="menu-grid">
        <button class="menu-btn" onclick="abrirAba('aba-info')">Informações</button>
        <div id="menu-principal" class="menu-grid">
    <button class="menu-btn" onclick="abrirAba('aba-info')">Informações</button>
    <button class="menu-btn" onclick="abrirAba('aba-info')">Iniciativa</button> <button class="menu-btn" onclick="abrirAba('aba-atrib')">Atributos</button>
    ...
</div>
        <button class="menu-btn" onclick="abrirAba('aba-atrib')">Atributos</button>
        <button class="menu-btn" onclick="abrirAba('aba-pericias')">Perícias</button>
        <button class="menu-btn" onclick="abrirAba('aba-combate')">Combate</button>
        <button class="menu-btn" onclick="abrirAba('aba-inv')">Inventário</button>
        <button class="menu-btn" onclick="abrirAba('aba-hab')">Habilidades</button>
        <button class="menu-btn" onclick="abrirAba('aba-rituais')">Rituais</button>
    </div>

    <div id="aba-info" class="aba-conteudo">
        <button class="btn-voltar" onclick="voltarParaMenu()">⬅ Voltar</button>
        <div class="character-card">
            <div class="info-section">
                <input type="text" class="char-name" id="nome" value="Yuki" placeholder="Nome">
                <div class="stats-row">
                    <input type="text" class="stat-pv" id="pv" value="31 / 31">
                    <input type="text" class="stat-san" id="san" value="47 / 47">
                    <input type="text" class="stat-pe" id="pe" value="41 / 49">
                </div>
            </div>
            <div>
                <input type="text" class="stat-ini" id="ini" value="0">
            </div>
        </div>
    </div>

    <div id="aba-desc" class="aba-conteudo">
        <button class="btn-voltar" onclick="voltarParaMenu()">⬅ Voltar</button>
        <p style="font-size: 14px; color: #aaa;">Histórico e detalhes visuais do personagem...</p>
    </div>

    <div id="aba-atrib" class="aba-conteudo">
        <button class="btn-voltar" onclick="voltarParaMenu()">⬅ Voltar</button>
        <p style="font-size: 14px; color: #aaa;">AGI, FOR, INT, PRE, VIG...</p>
    </div>

    <script type="module" src="./app.js"></script>
</body>
</html>
